    <text x="876" y="306" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" font-weight="600" fill="#06B6D4" letter-spacing="1.5">IMAGE GEN</text>
    <text x="876" y="340" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="500" fill="#64748B">逐镜头与批量生成</text>
    <text x="876" y="364" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="500" fill="#64748B">候选管理 · 明确采纳</text>
  </g>

  <g id="card-4">
    <rect x="64" y="410" width="368" height="230" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="408" y="460" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="56" font-weight="800" fill="#06B6D4" fill-opacity="0.07">04</text>
    <rect x="92" y="438" width="56" height="56" rx="14" fill="#ECFEFF"/>
