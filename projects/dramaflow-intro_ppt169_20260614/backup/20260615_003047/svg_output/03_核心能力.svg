    <text x="92" y="532" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="23" font-weight="700" fill="#1E293B">视频生成</text>
    <text x="92" y="556" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" font-weight="600" fill="#4F46E5" letter-spacing="1.5">VIDEO GEN</text>
    <text x="92" y="590" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="500" fill="#64748B">逐镜头与批量生成</text>
    <text x="92" y="614" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="500" fill="#64748B">多 provider 灵活切换</text>
  </g>

  <g id="card-5">
    <rect x="456" y="410" width="368" height="230" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="800" y="460" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="56" font-weight="800" fill="#4F46E5" fill-opacity="0.07">05</text>
    <rect x="484" y="438" width="56" height="56" rx="14" fill="#EEF2FF"/>
    <use data-icon="tabler-outline/microphone" x="492" y="446" width="40" height="40" fill="#4F46E5" stroke-width="2"/>
    <text x="484" y="532" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="23" font-weight="700" fill="#1E293B">TTS 配音</text>
    <text x="484" y="556" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" font-weight="600" fill="#06B6D4" letter-spacing="1.5">VOICEOVER</text>
    <text x="484" y="590" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="500" fill="#64748B">逐镜头 · 按场景批量</text>
    <text x="484" y="614" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="500" fill="#64748B">角色语音统一生成</text>
  </g>

  <g id="card-6">
    <rect x="848" y="410" width="368" height="230" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="1192" y="460" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="56" font-weight="800" fill="#06B6D4" fill-opacity="0.07">06</text>
    <rect x="876" y="438" width="56" height="56" rx="14" fill="#ECFEFF"/>
    <use data-icon="tabler-outline/users" x="884" y="446" width="40" height="40" fill="#06B6D4" stroke-width="2"/>
    <text x="876" y="532" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="23" font-weight="700" fill="#1E293B">协作审阅</text>
    <text x="876" y="556" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" font-weight="600" fill="#4F46E5" letter-spacing="1.5">COLLAB &amp; REVIEW</text>
