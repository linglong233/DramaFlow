  </g>

  <g id="card-3">
    <rect x="848" y="160" width="368" height="230" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="1192" y="210" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="56" font-weight="800" fill="#4F46E5" fill-opacity="0.07">03</text>
