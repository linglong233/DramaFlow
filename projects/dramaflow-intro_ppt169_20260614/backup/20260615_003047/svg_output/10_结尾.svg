  </g>

  <g id="end-lead">
    <text x="640" y="316" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="500" fill="#94A3B8" letter-spacing="2">感谢观看 · THANK YOU</text>
  </g>

