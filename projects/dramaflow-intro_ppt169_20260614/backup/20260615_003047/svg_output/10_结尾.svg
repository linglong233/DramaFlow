    <circle cx="70" cy="210" r="80" fill="#06B6D4" fill-opacity="0.08"/>
    <circle cx="1140" cy="600" r="150" fill="#4F46E5" fill-opacity="0.05"/>
    <circle cx="1190" cy="540" r="70" fill="#06B6D4" fill-opacity="0.07"/>
  </g>

  <g id="end-icon">
