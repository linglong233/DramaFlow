<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="brandLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <g id="bg">
    <rect width="1280" height="720" fill="#FFFFFF"/>
  </g>

  <g id="bg-decor">
    <circle cx="1130" cy="120" r="170" fill="#4F46E5" fill-opacity="0.06"/>
    <circle cx="1190" cy="200" r="90" fill="#06B6D4" fill-opacity="0.08"/>
    <circle cx="120" cy="620" r="150" fill="#4F46E5" fill-opacity="0.05"/>
    <circle cx="70" cy="560" r="70" fill="#06B6D4" fill-opacity="0.07"/>
  </g>

  <g id="cover-tag">
    <rect x="520" y="232" width="240" height="44" rx="22" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <use data-icon="tabler-outline/movie" x="544" y="242" width="24" height="24" fill="#4F46E5" stroke-width="2"/>
    <text x="700" y="260" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="600" fill="#4F46E5">AI · 短剧生产平台</text>
  </g>

  <g id="cover-title">
    <text x="640" y="380" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="96" font-weight="800" fill="#1E293B" letter-spacing="-1">Drama<tspan fill="#4F46E5">Flow</tspan></text>
  </g>

  <g id="cover-subtitle">
    <text x="640" y="436" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="29" font-weight="500" fill="#64748B">AI 驱动的短剧全流程生产平台</text>
  </g>

  <g id="cover-divider">
    <rect x="580" y="470" width="120" height="4" rx="2" fill="url(#brandLine)"/>
  </g>

  <g id="cover-info">
    <text x="640" y="528" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="500" fill="#94A3B8" letter-spacing="0.5">TypeScript Monorepo  ·  Web + API + Worker + Shared</text>
  </g>

  <g id="cover-footer">
    <rect x="556" y="580" width="168" height="36" rx="18" fill="#4F46E5"/>
    <text x="640" y="604" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">2026 · 项目介绍</text>
  </g>
</svg>
