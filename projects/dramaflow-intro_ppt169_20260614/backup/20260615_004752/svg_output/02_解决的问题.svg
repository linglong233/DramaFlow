<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="bg">
    <rect width="1280" height="720" fill="#FFFFFF"/>
  </g>

  <g id="header">
    <rect x="64" y="60" width="6" height="40" rx="3" fill="#4F46E5"/>
    <text x="84" y="92" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="36" font-weight="700" fill="#1E293B">解决的问题</text>
    <text x="1216" y="92" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="500" fill="#94A3B8" letter-spacing="1">THE PROBLEM</text>
  </g>

  <g id="subtitle">
    <text x="84" y="128" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="500" fill="#64748B">传统短剧生产流程的三重割裂 —— 工具、AI 能力、协作各自为政</text>
  </g>

  <g id="pain-1">
    <rect x="64" y="172" width="1152" height="104" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="96" y="200" width="48" height="48" rx="12" fill="#EEF2FF"/>
    <use data-icon="tabler-outline/components" x="104" y="208" width="32" height="32" fill="#4F46E5" stroke-width="2"/>
    <text x="168" y="222" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#1E293B">工具链割裂</text>
    <text x="168" y="254" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="500" fill="#64748B">剧本、分镜、绘图、视频、配音、剪辑散落多个工具，素材靠手动搬运</text>
    <text x="1184" y="248" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="56" font-weight="800" fill="#4F46E5" fill-opacity="0.07">01</text>
  </g>

  <g id="pain-2">
    <rect x="64" y="292" width="1152" height="104" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="96" y="320" width="48" height="48" rx="12" fill="#ECFEFF"/>
    <use data-icon="tabler-outline/robot" x="104" y="328" width="32" height="32" fill="#06B6D4" stroke-width="2"/>
    <text x="168" y="342" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#1E293B">AI 能力难成闭环</text>
    <text x="168" y="374" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="500" fill="#64748B">文本 / 图 / 视频 / TTS 各自为政，产出物无法被下游复用</text>
    <text x="1184" y="368" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="56" font-weight="800" fill="#06B6D4" fill-opacity="0.07">02</text>
  </g>

  <g id="pain-3">
    <rect x="64" y="412" width="1152" height="104" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="96" y="440" width="48" height="48" rx="12" fill="#EEF2FF"/>
    <use data-icon="tabler-outline/users" x="104" y="448" width="32" height="32" fill="#4F46E5" stroke-width="2"/>
    <text x="168" y="462" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#1E293B">协作与审阅缺位</text>
    <text x="168" y="494" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="500" fill="#64748B">版本、评论、审计、权限依赖文件名与聊天记录</text>
    <text x="1184" y="488" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="56" font-weight="800" fill="#4F46E5" fill-opacity="0.07">03</text>
  </g>

  <g id="resolution">
    <rect x="64" y="548" width="1152" height="84" rx="14" fill="#4F46E5"/>
    <use data-icon="tabler-outline/rocket" x="96" y="572" width="36" height="36" fill="#FFFFFF" stroke-width="2"/>
    <text x="148" y="598" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">DramaFlow 的回答 —— 一个平台，一条 AI 全流程闭环</text>
    <polygon points="1148,572 1168,585 1148,598" fill="#FFFFFF"/>
  </g>

  <g id="footer">
    <text x="64" y="688" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" font-weight="500" fill="#94A3B8">DramaFlow</text>
    <text x="1216" y="688" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" font-weight="500" fill="#94A3B8">02 / 11</text>
  </g>
</svg>
