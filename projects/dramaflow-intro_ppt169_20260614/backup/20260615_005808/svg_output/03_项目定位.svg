<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="bg">
    <rect width="1280" height="720" fill="#FFFFFF"/>
  </g>

  <g id="bg-decor">
    <circle cx="160" cy="180" r="110" fill="#06B6D4" fill-opacity="0.05"/>
    <circle cx="1120" cy="560" r="130" fill="#4F46E5" fill-opacity="0.05"/>
  </g>

  <g id="header">
    <rect x="64" y="60" width="6" height="40" rx="3" fill="#4F46E5"/>
    <text x="84" y="92" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="36" font-weight="700" fill="#1E293B">项目定位</text>
    <text x="1216" y="92" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="500" fill="#94A3B8" letter-spacing="1">POSITIONING</text>
  </g>

  <g id="hero-statement">
    <text x="640" y="280" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="40" font-weight="600" fill="#1E293B">
      <tspan x="640" dy="0">面向<tspan fill="#4F46E5" font-weight="700">导演与制作团队</tspan>的</tspan>
    </text>
    <text x="640" y="338" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="40" font-weight="600" fill="#1E293B">
      <tspan x="640" dy="0">短剧 <tspan fill="#4F46E5" font-weight="700">AI 全流程</tspan> 生产平台</tspan>
    </text>
  </g>

  <g id="hero-flow">
    <text x="640" y="410" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="500" fill="#64748B">从一句话梗概到成片导出 —— 全程在同一平台完成</text>
  </g>

  <g id="capability-divider">
    <line x1="300" y1="480" x2="980" y2="480" stroke="#E2E8F0" stroke-width="1"/>
  </g>

  <g id="pillars">
    <g id="pillar-1">
      <use data-icon="tabler-outline/writing" x="320" y="540" width="34" height="34" fill="#4F46E5" stroke-width="2"/>
      <text x="370" y="556" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#1E293B">创作</text>
      <text x="370" y="582" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="500" fill="#64748B">剧本 · 梗概 · 分镜</text>
    </g>
    <line x1="566" y1="530" x2="566" y2="596" stroke="#E2E8F0" stroke-width="1"/>
    <g id="pillar-2">
      <use data-icon="tabler-outline/photo" x="602" y="540" width="34" height="34" fill="#06B6D4" stroke-width="2"/>
      <text x="652" y="556" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#1E293B">媒体生产</text>
      <text x="652" y="582" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="500" fill="#64748B">图片 · 视频 · 配音</text>
    </g>
    <line x1="850" y1="530" x2="850" y2="596" stroke="#E2E8F0" stroke-width="1"/>
    <g id="pillar-3">
      <use data-icon="tabler-outline/file-export" x="884" y="540" width="34" height="34" fill="#4F46E5" stroke-width="2"/>
      <text x="934" y="556" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#1E293B">协作与导出</text>
      <text x="934" y="582" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="500" fill="#64748B">审阅 · 时间线 · 成片</text>
    </g>
  </g>

  <g id="footer">
    <text x="64" y="688" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" font-weight="500" fill="#94A3B8">DramaFlow</text>
    <text x="1216" y="688" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" font-weight="500" fill="#94A3B8">03 / 11</text>
  </g>
</svg>
